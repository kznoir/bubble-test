    ctx.restore();

    // Play field tint
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.035)";
    roundRect(18, CONFIG.topPadding - CONFIG.topArcDepth - 8, W - 36, H - CONFIG.topPadding + CONFIG.topArcDepth - 22, 18, true);
    ctx.restore();

    // Ambient background bubbles
    drawAmbientBubbles(hudNow);

    // Side walls
    ctx.strokeStyle = "rgba(255,255,255,.16)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(CONFIG.sidePadding, topArcY(CONFIG.sidePadding));
    ctx.lineTo(CONFIG.sidePadding, H - CONFIG.bottomPadding);
    ctx.moveTo(W - CONFIG.sidePadding, topArcY(W - CONFIG.sidePadding));
    ctx.lineTo(W - CONFIG.sidePadding, H - CONFIG.bottomPadding);
    ctx.stroke();

    // Top arc: center rises
    ctx.beginPath();
    for (let x = CONFIG.sidePadding; x <= W - CONFIG.sidePadding; x += 8) {
      const y = topArcY(x);
      if (x === CONFIG.sidePadding) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // v76: 滑らかな海底。トゲ・危険バー・警告文は表示しない。
    ctx.save();

    const grd = ctx.createLinearGradient(0, seabedY - CONFIG.seabedArcHeight, 0, H);
    grd.addColorStop(0, "rgba(174,132,78,.96)");
    grd.addColorStop(0.42, "rgba(126,88,52,.98)");
    grd.addColorStop(1, "rgba(82,57,36,.99)");

    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(0, H);
    ctx.lineTo(0, seabedArcY(0));
    for (let x = 0; x <= W; x += 8) {
      ctx.lineTo(x, seabedArcY(x));
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fill();

    // 地面上端の柔らかい縁
    ctx.strokeStyle = gameOver ? "rgba(255,150,125,.92)" : "rgba(238,196,132,.92)";
    ctx.lineWidth = gameOver ? 4.2 : 3;
    ctx.beginPath();
    for (let x = 0; x <= W; x += 8) {
      const y = seabedArcY(x);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // Sand dots
    for (let x = 18; x < W - 10; x += 22) {
      const gy = seabedArcY(x);
      const y = gy + 12 + ((x * 13) % 18);
      ctx.fillStyle = "rgba(225,205,165,.16)";
      ctx.beginPath();
      ctx.arc(x, y, 1.6 + ((x * 7) % 7) * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }

    // Seaweed
    ctx.strokeStyle = "rgba(52,110,84,.55)";
    ctx.lineWidth = 3;
    for (const x of [34, 72, 318, 350]) {
      const gy = seabedArcY(x);
      ctx.beginPath();
      ctx.moveTo(x, H - 8);
      ctx.quadraticCurveTo(x - 5, gy + 36, x + 4, gy + 18);
      ctx.quadraticCurveTo(x + 10, gy - 2, x - 2, gy - 22);
      ctx.stroke();
    }

    ctx.restore();

    ctx.fillStyle = "rgba(255,255,255,.55)";
    ctx.font = "12px system-ui";
    ctx.textAlign = "left";
    ctx.fillText(`shots ${shots}`, 24, CONFIG.topPadding + 18);
  }

  function getPendingNuisanceMotion(p, now) {
    const elapsed = now - p.bornAt;
    const t = clamp(elapsed / CONFIG.nuisanceTelegraphMs, 0, 1);

    const growMs = Math.max(1, CONFIG.nuisanceTelegraphMs - CONFIG.nuisanceSurfacePauseMs);
    const growT = clamp(elapsed / growMs, 0, 1);
    const ease = 1 - Math.pow(1 - growT, 3);

    // 地中から地表まで登る間に、最大サイズまで育つ
    const r = p.targetR * (CONFIG.nuisanceGrowFromScale + (1 - CONFIG.nuisanceGrowFromScale) * ease);
    const y = p.startY + (p.surfaceY - p.startY) * ease;

    return {
      t,
      growT,
      r,
      x: p.x,
      y,
      liftVy: CONFIG.nuisancePreviewLiftSpeed,
      isSurfacePause: elapsed >= growMs
    };
  }

  function drawPendingNuisance(p, now) {
    const m = getPendingNuisanceMotion(p, now);
    const t = m.t;
    const r = m.r;
    const localGroundY = seabedArcY(m.x);

    const jxBase = Math.sin(now * 0.032 + p.x * 0.1) * CONFIG.nuisanceTelegraphJitter;
    const jyBase = Math.cos(now * 0.029 + p.x * 0.07) * CONFIG.nuisanceTelegraphJitter * 0.16;

    const x = m.x + jxBase * (0.16 + t * 0.42);
    const y = m.y + (m.isSurfacePause ? jyBase * 0.35 : jyBase);

    ctx.save();

    const grd = ctx.createRadialGradient(x - r * .35, y - r * .45, r * .12, x, y, r);
    grd.addColorStop(0, "rgba(255,255,255,.96)");
    grd.addColorStop(0.35, "rgba(170,220,255,.78)");
    grd.addColorStop(1, "rgba(90,140,210,.28)");

    ctx.fillStyle = grd;
    ctx.strokeStyle = `rgba(210,240,255,${0.24 + t * 0.46})`;
    ctx.lineWidth = 2.0;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // 地中から湧き出て、地表に達するまで砂の盛り上がりを見せる
    if (m.growT < 1 || y + r > localGroundY - 4) {
      ctx.fillStyle = "rgba(230,210,170,.16)";
      ctx.beginPath();
      ctx.ellipse(x, localGroundY + 2, Math.max(8, r * 0.8), Math.max(2, r * 0.18), 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // 小さな泡の白ハイライト
    ctx.fillStyle = "rgba(255,255,255,.5)";
    ctx.beginPath();
    ctx.arc(x - r * .3, y - r * .3, Math.max(1.8, r * .16), 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBall(o) {
    ctx.save();

    const shake = getGameOverShake(o, performance.now());
    const x = o.x + shake.dx;
    const y = o.y + shake.dy;
    const angle = o.angle + shake.da;
    const squashAge = performance.now() - (o.squashAt || -9999);
    let squash = 0;
    if (squashAge >= 0 && squashAge <= CONFIG.squashVisibleMs) {
      const decay = Math.exp(-squashAge / 95);
      const snap = 0.82 + 0.18 * Math.cos(squashAge * 0.055);
      const squashLimit = o.type === "nuisance" ? CONFIG.nuisanceSoftVisualMax : CONFIG.squashMax;
      squash = clamp((o.squash || 0) * decay * snap, 0, squashLimit) * (gameOver ? 0.35 : 1);
    }
    if (squash < 0.006) squash = 0;
    const squashAngle = o.squashAngle || 0;

    ctx.translate(x, y);
    ctx.rotate(squashAngle);
    ctx.scale(1 + squash * 0.62, 1 - squash);
    ctx.rotate(-squashAngle);

    if (o.type === "nuisance") {
      const grd = ctx.createRadialGradient(-o.r * .35, -o.r * .45, o.r * .12, 0, 0, o.r);
      grd.addColorStop(0, "rgba(255,255,255,.95)");
      grd.addColorStop(0.35, "rgba(170,220,255,.72)");
      grd.addColorStop(1, "rgba(90,140,210,.45)");

      ctx.fillStyle = grd;
      ctx.strokeStyle = gameOverTouchedIds.includes(o.id) && gameOver ? "rgba(255,230,230,.95)" : "rgba(210,240,255,.8)";
      ctx.lineWidth = gameOverTouchedIds.includes(o.id) && gameOver ? 3 : 2;
      ctx.beginPath();
      ctx.arc(0, 0, o.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,.75)";
      ctx.beginPath();
      ctx.arc(-o.r * .35, -o.r * .35, o.r * .16, 0, Math.PI * 2);
      ctx.fill();

      ctx.save();
      ctx.rotate(angle);
      ctx.scale(shake.scale, shake.scale);
      ctx.strokeStyle = "rgba(255,255,255,.42)";
      ctx.lineWidth = 2.4;
      ctx.beginPath();
      ctx.arc(0, 0, o.r * .66, -0.7, 0.9);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, o.r * .42, 2.3, 3.1);
      ctx.stroke();
      ctx.restore();

      ctx.restore();
      return;
    }

    const grd = ctx.createRadialGradient(-o.r * .35, -o.r * .38, o.r * .18, 0, 0, o.r);
    grd.addColorStop(0, "#ffffff");
    grd.addColorStop(0.18, colors[o.level]);
    grd.addColorStop(1, shade(colors[o.level], -32));

    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(0, 0, o.r, 0, Math.PI * 2);
    ctx.fill();

    const touched = gameOver && gameOverTouchedIds.includes(o.id);
    ctx.strokeStyle = touched ? "rgba(255,235,235,.98)" : (o.active ? "rgba(255,255,255,.95)" : "rgba(255,255,255,.66)");
    ctx.lineWidth = touched ? 4.5 : (o.active ? 4 : 2);
    ctx.stroke();

    ctx.save();
    ctx.rotate(angle);
    ctx.scale(shake.scale, shake.scale);
    ctx.strokeStyle = "rgba(255,255,255,.26)";
    ctx.lineWidth = Math.max(1.5, o.r * 0.045);
    ctx.beginPath();
    ctx.arc(0, 0, o.r * .68, -0.85, 0.85);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(0, 0, o.r * .43, 2.15, 3.05);
    ctx.stroke();

    // モックでは数字も中の絵として扱い、回転が分かるよう一緒に回す。
    const label = labels[o.level];
    const fontSize = Math.max(12, o.r * 0.58);

    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.font = `700 ${fontSize}px system-ui`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(label, 0, 1);

    // 6 と 9 は下に短い横線を付けて判別しやすくする
    if (label === "6" || label === "9") {
      const markerW = fontSize * 0.42;
      const markerY = fontSize * 0.36;
      ctx.strokeStyle = "rgba(0,0,0,.55)";
      ctx.lineWidth = Math.max(1.6, fontSize * 0.075);
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(-markerW * 0.5, markerY);
      ctx.lineTo(markerW * 0.5, markerY);
      ctx.stroke();
    }

    ctx.restore();

    ctx.restore();
  }

  function drawShooter(now) {
    const ready = canShoot(now);
    let shot = {
      dirX: 0,
      dirY: -1,
      offsetDeg: 0,
      speed: CONFIG.shotPowerMin,
      powerRatio: 0,
      pullDistance: 0,
      handleX: shooter.x,
      handleY: shooter.y + 1
    };

    if (drag) {
      shot = getShotFromPointer(drag);

      ctx.save();

      // スリング線。必ず実発射方向の真逆。
      ctx.strokeStyle = "rgba(255,255,255,.45)";
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(shooter.x, shooter.y);
      ctx.lineTo(shot.handleX, shot.handleY);
      ctx.stroke();

      ctx.fillStyle = "rgba(255,255,255,.18)";
      ctx.beginPath();
      ctx.arc(shot.handleX, shot.handleY, 18 + 14 * shot.powerRatio, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    if (drag && ready) {
      const path = simulateTrajectory(shot, currentLevel);

      ctx.save();

      // 初速方向。これが発射直後の角度。
      ctx.strokeStyle = "rgba(255,255,255,.92)";
      ctx.lineWidth = 4 + shot.powerRatio * 4;
      const solidGuideEnd = 52 + shot.powerRatio * 32;
      ctx.beginPath();
      ctx.moveTo(shooter.x + shot.dirX * 30, shooter.y + shot.dirY * 30);
      ctx.lineTo(shooter.x + shot.dirX * solidGuideEnd, shooter.y + shot.dirY * solidGuideEnd);
      ctx.stroke();

      // 実際の発射中ロジックと同じ予測点。
      // ただし見えすぎないよう、画面中央付近でフェードアウトする。
      for (let i = 0; i < path.length; i++) {
        const p = path[i];

        let fade = 1;
        if (p.y <= CONFIG.guideFadeStartY) {
          fade = clamp(
            (p.y - CONFIG.guideFadeEndY) / (CONFIG.guideFadeStartY - CONFIG.guideFadeEndY),
            0,
            1
          );
        }
        if (fade <= 0) continue;

        const rr = Math.max(2.1, 5.2 - i * 0.052);
        ctx.fillStyle = `rgba(255,255,255,${0.34 * fade})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, rr, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = "rgba(255,255,255,.78)";
      ctx.font = "12px system-ui";
      ctx.textAlign = "center";
      const sign = shot.offsetDeg > 0 ? "+" : "";
      ctx.fillText(`aim ${sign}${shot.offsetDeg.toFixed(0)}°`, shooter.x, shooter.y - 58);

      ctx.restore();
    }

    // 直前ショットの初速方向を一瞬残す
    if (lastShotTrace && now - lastShotTrace.bornAt < 700) {
      const t = 1 - (now - lastShotTrace.bornAt) / 700;
      ctx.save();
      ctx.strokeStyle = `rgba(120,220,255,${0.65 * t})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(lastShotTrace.x, lastShotTrace.y);
      ctx.lineTo(lastShotTrace.x + lastShotTrace.dirX * 120, lastShotTrace.y + lastShotTrace.dirY * 120);
      ctx.stroke();
      ctx.restore();
    }

    // cannon
    ctx.save();
    ctx.translate(shooter.x, shooter.y);
    ctx.rotate(Math.atan2(shot.dirY, shot.dirX));

    ctx.fillStyle = ready ? "rgba(255,255,255,.88)" : "rgba(255,255,255,.38)";
    roundRect(0, -10, 44, 20, 10, true);

    ctx.fillStyle = "rgba(30,40,65,.95)";
    roundRect(8, -6, 28, 12, 6, true);
    ctx.restore();

    // base + current shootable object
    ctx.save();
    ctx.fillStyle = "rgba(255,255,255,.14)";
    ctx.beginPath();
    ctx.arc(shooter.x, shooter.y, 34, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.45)";
    ctx.lineWidth = 2;
    ctx.stroke();

    // 現在撃てるオブジェクトは発射砲上に表示
    const currentR = Math.min(26, Math.max(11, CONFIG.radii[currentLevel] * 0.52));
    ctx.fillStyle = colors[currentLevel];
    ctx.beginPath();
    ctx.arc(shooter.x, shooter.y, currentR, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.80)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.font = `700 ${Math.max(12, currentR * 0.62)}px system-ui`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(labels[currentLevel], shooter.x, shooter.y + 1);

    // v63: 弾表示の上から砲身を薄く再描画して、5などでも発射方向が隠れないようにする。
    ctx.save();
    ctx.translate(shooter.x, shooter.y);
    ctx.rotate(Math.atan2(shot.dirY, shot.dirX));
    ctx.fillStyle = ready ? "rgba(255,255,255,.72)" : "rgba(255,255,255,.32)";
    roundRect(18, -6, 28, 12, 6, true);
    ctx.fillStyle = "rgba(30,40,65,.88)";
    roundRect(23, -3.5, 18, 7, 4, true);
    ctx.restore();

    ctx.restore();

    // NEXT preview: 次に撃てるもの。砲台上の現在弾より小さく表示
    const nextX = shooter.x + 78;
    const nextY = shooter.y;
    const previewR = Math.max(9, CONFIG.radii[nextLevel] * 0.46);

    ctx.save();
    ctx.fillStyle = "rgba(9,14,28,.88)";
    roundRect(nextX - 28, nextY - 28, 56, 62, 14, true);
    ctx.strokeStyle = "rgba(255,255,255,.14)";
    ctx.lineWidth = 1.5;
    roundRect(nextX - 28, nextY - 28, 56, 62, 14, false);

    ctx.fillStyle = "rgba(255,255,255,.62)";
    ctx.font = "10px system-ui";
    ctx.textAlign = "center";
    ctx.textBaseline = "alphabetic";
    ctx.fillText("NEXT", nextX, nextY - 11);

    ctx.fillStyle = colors[nextLevel];
    ctx.beginPath();
    ctx.arc(nextX, nextY + 12, previewR, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = "rgba(255,255,255,.72)";
    ctx.lineWidth = 1.8;
    ctx.stroke();

    ctx.fillStyle = "rgba(0,0,0,.45)";
    ctx.font = `700 ${Math.max(10, previewR * 0.58)}px system-ui`;
    ctx.textBaseline = "middle";
    ctx.fillText(labels[nextLevel], nextX, nextY + 13);
    ctx.restore();
  }

  function drawStartScreen() {
    ctx.save();

    ctx.fillStyle = "rgba(3,8,20,.76)";
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H * 0.47;

    ctx.fillStyle = "rgba(7,20,42,.95)";
    roundRect(cx - 145, cy - 102, 290, 204, 26, true);

    ctx.strokeStyle = "rgba(185,235,255,.44)";
    ctx.lineWidth = 2;
    roundRect(cx - 145, cy - 102, 290, 204, 26, false);

    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(255,255,255,.98)";
    ctx.font = "900 31px system-ui";
    ctx.fillText("BUBBLE MERGE", cx, cy - 45);

    ctx.fillStyle = "rgba(180,230,255,.78)";
    ctx.font = "14px system-ui";
    ctx.fillText("海の中で、上へ浮かべて合体", cx, cy - 12);

    ctx.fillStyle = "rgba(255,255,255,.96)";
    ctx.font = "800 21px system-ui";
    ctx.fillText("タップしてスタート", cx, cy + 37);

    ctx.fillStyle = "rgba(255,255,255,.55)";
    ctx.font = "12px system-ui";
    ctx.fillText("音声はタップ後に再生されます", cx, cy + 69);

    ctx.restore();
  }

  function drawLevel10Celebration(now) {
    if (level10CelebrationAt == null || level10ReachedMs == null) return;

    const elapsed = now - level10CelebrationAt;
    if (elapsed < 0 || elapsed > CONFIG.level10CelebrationMs) return;

    const t = clamp(elapsed / CONFIG.level10CelebrationMs, 0, 1);
    const alpha = Math.sin(Math.PI * t);
    const scale = 0.92 + 0.12 * Math.sin(Math.PI * Math.min(1, t * 1.6));

    ctx.save();
    ctx.translate(W / 2, H * 0.40);
    ctx.scale(scale, scale);

    ctx.fillStyle = `rgba(7,18,36,${0.78 * alpha})`;
    roundRect(-118, -48, 236, 96, 20, true);

    ctx.strokeStyle = `rgba(190,255,220,${0.95 * alpha})`;
    ctx.lineWidth = 3;
    roundRect(-118, -48, 236, 96, 20, false);

    ctx.textAlign = "center";
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.font = "900 27px system-ui";
    ctx.fillText("LEVEL 10!", 0, -8);

    ctx.fillStyle = `rgba(185,255,210,${alpha})`;
    ctx.font = "800 22px ui-monospace, SFMono-Regular, Menlo, monospace";
    ctx.fillText(formatHudTime(level10ReachedMs), 0, 25);

    ctx.restore();
  }

  function drawGameOver() {
    ctx.save();
    ctx.fillStyle = "rgba(4,8,18,.78)";
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2;
    const cy = H / 2 - 18;

    ctx.fillStyle = "rgba(8,18,38,.96)";
    roundRect(cx - 142, cy - 132, 284, 264, 24, true);
    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 2;
    roundRect(cx - 142, cy - 132, 284, 264, 24, false);

    ctx.textAlign = "center";
    ctx.fillStyle = "#fff";
    ctx.font = "900 32px system-ui";
    ctx.fillText("GAME OVER", cx, cy - 88);

    ctx.fillStyle = "rgba(255,255,255,.56)";
    ctx.font = "11px system-ui";
    ctx.fillText("SCORE", cx, cy - 48);
    ctx.fillStyle = "rgba(255,255,255,.98)";
    ctx.font = "900 30px system-ui";
    ctx.fillText(String(score), cx, cy - 18);

    ctx.fillStyle = "rgba(255,255,255,.58)";
    ctx.font = "11px system-ui";
    ctx.fillText("LEVEL 10 TIME", cx, cy + 20);
    ctx.fillStyle = "rgba(185,255,210,.98)";
    ctx.font = "800 20px ui-monospace, SFMono-Regular, Menlo, monospace";
    ctx.fillText(level10ReachedMs == null ? "--:--.-" : formatHudTime(level10ReachedMs), cx, cy + 44);

    ctx.fillStyle = "rgba(255,255,255,.58)";
    ctx.font = "11px system-ui";
    ctx.fillText("PLAY TIME", cx, cy + 76);
    ctx.fillStyle = "rgba(190,235,255,.98)";
    ctx.font = "800 20px ui-monospace, SFMono-Regular, Menlo, monospace";
    ctx.fillText(formatHudTime(gameEndElapsedMs), cx, cy + 100);

    ctx.fillStyle = "rgba(255,255,255,.76)";
    ctx.font = "14px system-ui";
    ctx.fillText("タップまたは R でリトライ", cx, cy + 148);

    ctx.restore();
  }

  function draw() {
    const now = performance.now();

    drawBackground();

    for (const p of pendingNuisances) drawPendingNuisance(p, now);

    const sorted = objects.slice().sort((a, b) => a.r - b.r);
    for (const o of sorted) drawBall(o);

    drawParticles(now);

    drawShooter(now);

    if (!gameStarted) drawStartScreen();
    if (gameStarted && !gameOver) drawLevel10Celebration(now);
    if (gameOver) drawGameOver();
  }

  function loop(ts) {
    // v76:
    // requestAnimationFrame は端末によって60Hz/120Hzなど異なる。
    // 衝突解決回数まで描画Hzに依存していたため、iPhoneでは球速・反発が
    // PCと異なって見えることがあった。物理更新だけ常に60Hzへ固定する。
    let elapsedMs = ts - lastTs;
    lastTs = ts;

    // タブ復帰時などに一気に何十回も物理更新しない。
    elapsedMs = clamp(elapsedMs, 0, FIXED_PHYSICS_MS * MAX_CATCHUP_STEPS);
    physicsAccumulatorMs += elapsedMs;

    let steps = 0;
    while (physicsAccumulatorMs >= FIXED_PHYSICS_MS && steps < MAX_CATCHUP_STEPS) {
      updateGame(1, ts);
      physicsAccumulatorMs -= FIXED_PHYSICS_MS;
      steps++;
    }

    // 120Hz端末では描画だけ120Hz、物理は60Hz。
    draw();
    requestAnimationFrame(loop);
  }

  function roundRect(x, y, w, h, r, fill) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    else ctx.stroke();
  }

  function shade(hex, amount) {
    const c = hex.replace("#", "");
    const n = parseInt(c, 16);
    let r = (n >> 16) + amount;
    let g = ((n >> 8) & 255) + amount;
    let b = (n & 255) + amount;
    r = clamp(r, 0, 255);
    g = clamp(g, 0, 255);
    b = clamp(b, 0, 255);
    return `rgb(${r},${g},${b})`;
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    try { canvas.setPointerCapture(e.pointerId); } catch (_) {}

    if (!gameStarted) {
      startGameFromTap();
      return;
    }

    if (gameOver) {
      reset();
      return;
    }

    startDrag(getPointer(e));
  });

  canvas.addEventListener("pointermove", (e) => {
    e.preventDefault();
    updateDrag(getPointer(e));
  });

  canvas.addEventListener("pointerup", (e) => {
    e.preventDefault();
    endDrag();
  });

  canvas.addEventListener("pointercancel", () => {
    drag = null;
  });

  document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
      pauseAudioForBackground();
    } else {
      resumeAudioFromBackground();
    }
  });

  window.addEventListener("pagehide", () => {
    pauseAudioForBackground();
  });

  window.addEventListener("pageshow", () => {
    resumeAudioFromBackground();
  });

  window.addEventListener("blur", () => {
    pauseAudioForBackground();
  });

  window.addEventListener("focus", () => {
    resumeAudioFromBackground();
  });

  window.addEventListener("keydown", (e) => {
    if (!gameStarted && (e.key === "Enter" || e.key === " ")) {
      e.preventDefault();
      startGameFromTap();
      return;
    }

    if (gameStarted && (e.key === "r" || e.key === "R")) reset();
  });

  loadHighScore();
  loadLevel10Best();
  reset();
  gameStarted = false;
  requestAnimationFrame(loop);
})();
</script>
</body>
